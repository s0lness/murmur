<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>murmur · fuzz</title>
<style>
  :root {
    --bg:#0d1017; --panel:#151a23; --edge:#222a36; --ink:#e6edf3; --mut:#7d8794;
    --green:#3fb950; --red:#f85149; --purple:#a371f7; --amber:#d29922; --blue:#58a6ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { position:sticky; top:0; z-index:5; background:linear-gradient(#0d1017ee,#0d1017cc); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--edge); padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  h1 b { color:var(--purple); }
  .phase { display:flex; align-items:center; gap:8px; color:var(--blue); font-weight:600; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--blue); animation:pulse 1.1s infinite; }
  .phase.done .dot { background:var(--green); animation:none; }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  .meta { color:var(--mut); display:flex; gap:14px; flex-wrap:wrap; }
  .meta b { color:var(--ink); }
  .flag { background:var(--edge); color:var(--blue); padding:1px 7px; border-radius:10px; font-size:12px; }
  main { display:grid; grid-template-columns: 1.15fr 1fr; gap:16px; padding:16px 20px 60px; align-items:start; }
  .col { display:flex; flex-direction:column; gap:16px; }
  section { background:var(--panel); border:1px solid var(--edge); border-radius:10px; overflow:hidden; }
  .head { padding:9px 13px; border-bottom:1px solid var(--edge); display:flex; justify-content:space-between; align-items:center; }
  .head .t { font-weight:700; letter-spacing:.4px; }
  .head .c { color:var(--mut); font-size:12px; }
  .body { padding:10px 13px; display:flex; flex-direction:column; gap:7px; max-height:42vh; overflow:auto; }
  .pop { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; max-height:none; }
  .card { background:#10151d; border:1px solid var(--edge); border-radius:8px; padding:8px 9px; }
  .card .n { font-weight:700; font-size:12.5px; }
  .card .b { color:var(--mut); font-size:11px; margin:2px 0 6px; line-height:1.3; }
  .chips { display:flex; flex-wrap:wrap; gap:4px; }
  .chip { font-size:10.5px; padding:1px 6px; border-radius:9px; border:1px solid var(--edge); color:var(--mut); white-space:nowrap; }
  .chip.seek{ color:var(--blue); border-color:#1f3a5f; }
  .chip.offer{ color:var(--green); border-color:#1f4427; }
  .chip.swap,.chip.barter{ color:var(--purple); border-color:#3a2a5f; }
  .row { padding:7px 9px; border-radius:7px; border:1px solid var(--edge); background:#10151d; animation:in .35s ease; }
  @keyframes in { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
  .deal { border-left:3px solid var(--green); }
  .deal.m { border-left-color:var(--amber); }
  .deal.h { border-left-color:var(--purple); }
  .deal .w { font-weight:700; }
  .deal .d { color:var(--mut); font-size:12px; }
  .decl { color:var(--mut); font-size:12.5px; border-left:3px solid #30363d; }
  .decl .why { color:#9aa4b1; }
  .edge { font-size:12.5px; border-left:3px solid var(--purple); }
  .edge code { color:var(--purple); }
  .edge .q { color:var(--amber); }
  .um { color:var(--mut); font-size:12px; }
  .um b { color:var(--ink); }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:13px; }
  .stat { background:#10151d; border:1px solid var(--edge); border-radius:8px; padding:10px; text-align:center; }
  .stat .v { font-size:22px; font-weight:800; }
  .stat .l { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
  .empty { color:var(--mut); font-style:italic; font-size:12.5px; }
  @media(max-width:880px){ main{grid-template-columns:1fr} }
</style>
</head>
<body>
<header>
  <h1>mur<b>mur</b> · fuzz</h1>
  <div class="phase" id="phase"><span class="dot"></span><span id="phaseText">connecting…</span></div>
  <div class="meta" id="meta"></div>
</header>
<main>
  <div class="col">
    <section>
      <div class="head"><span class="t">population</span><span class="c" id="popCount"></span></div>
      <div class="body pop" id="pop"></div>
    </section>
    <section>
      <div class="head"><span class="t">fell through</span><span class="c" id="declCount"></span></div>
      <div class="body" id="decl"></div>
    </section>
  </div>
  <div class="col">
    <section>
      <div class="head"><span class="t">deals</span><span class="c" id="dealCount"></span></div>
      <div class="body" id="deals"></div>
    </section>
    <section>
      <div class="head"><span class="t">helper · fuzzy edges</span><span class="c" id="edgeCount"></span></div>
      <div class="body" id="edges"></div>
    </section>
    <section>
      <div class="head"><span class="t">metrics</span><span class="c" id="helperStat"></span></div>
      <div class="metrics" id="metrics"></div>
    </section>
    <section>
      <div class="head"><span class="t">still open</span><span class="c" id="umCount"></span></div>
      <div class="body" id="um"></div>
    </section>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const kindClass = (k) => k.startsWith('~') ? 'h' : (k==='group'||k==='ring') ? 'm' : '';
const setText = (el, t) => { if (el.textContent !== t) el.textContent = t; }; // avoid needless writes

/**
 * Incremental list sync: only APPEND new rows (or rebuild on shrink/reset), so
 * existing DOM nodes are never recreated and their CSS fade-in doesn't re-fire.
 * That's what was causing the per-poll flicker on deals/edges/declines.
 */
function syncList(el, items, rowHtml, emptyHtml) {
  if (!items.length) { if (el.dataset.n !== '0') { el.innerHTML = `<span class="empty">${emptyHtml}</span>`; el.dataset.n = '0'; } return; }
  const have = el.dataset.n === undefined ? 0 : Number(el.dataset.n);
  if (items.length < have || el.firstElementChild?.classList.contains('empty')) { el.innerHTML = ''; } // reset / was-empty
  const from = (items.length < have) ? 0 : (el.children.length);
  let html = '';
  for (let i = from; i < items.length; i++) html += rowHtml(items[i], i);
  if (html) el.insertAdjacentHTML('beforeend', html);
  el.dataset.n = String(items.length);
}

function render(s) {
  const done = s.phase === 'done';
  $('phase').className = 'phase' + (done ? ' done' : '');
  setText($('phaseText'), done ? 'run complete' : s.phase);
  const meta = `<span><b>${s.n}</b> agents</span><span>model <b>${esc(s.model)}</b></span>` +
    (s.flags?.length ? s.flags.map(f=>`<span class="flag">${esc(f)}</span>`).join('') : '');
  if ($('meta').innerHTML !== meta) $('meta').innerHTML = meta;

  // population (rebuild only when the count changes — cards have no animation)
  setText($('popCount'), (s.population?.length||0) + ' people');
  syncList($('pop'), s.population||[], p => `
    <div class="card"><div class="n">${esc(p.name)}</div><div class="b">${esc(p.brief||'')}</div>
    <div class="chips">${(p.intents||[]).map(it=>{const k=it.split(':')[0];return `<span class="chip ${k}">${esc(it)}</span>`}).join('')}</div></div>`, 'waiting…');

  // deals
  setText($('dealCount'), String(s.deals?.length||0));
  syncList($('deals'), s.deals||[], d => `
    <div class="row deal ${kindClass(d.kind)}"><span class="w">${esc(d.who.join(' ⇄ '))}</span>
    <span class="d"> — ${esc(d.kind)} · ${esc(d.detail)}</span></div>`, 'no deals yet');

  // declines
  setText($('declCount'), String(s.declines?.length||0));
  syncList($('decl'), s.declines||[], x => {
    const i = x.indexOf('—');
    const head = i>0 ? x.slice(0,i) : x, why = i>0 ? x.slice(i) : '';
    return `<div class="row decl">${esc(head)}<span class="why">${esc(why)}</span></div>`;
  }, 'none');

  // edges
  setText($('edgeCount'), String(s.edges?.length||0));
  syncList($('edges'), s.edges||[], e => `
    <div class="row edge"><code>${esc(e.a)}</code> ≈ <code>${esc(e.b)}</code>
    <span class="d"> (${e.confidence})</span>${e.question?`<div class="q">↳ ${esc(e.question)}</div>`:''}</div>`, 'no fuzzy edges proposed');

  // metrics (write only on change — no animation, but avoid DOM churn)
  if (s.metrics) {
    const m = s.metrics;
    setText($('helperStat'), m.helper ? m.helper.replace(/^helper\(hybrid\):\s*/,'helper: ') : '');
    const mh = [
      ['cleared', `${m.cleared}/${m.pop}`], ['coverage', m.coveragePct+'%'],
      ['surplus', m.surplus], ['groups', m.groups], ['rings', m.rings],
      ['deals', (s.deals?.length||0)], ['fell through', (s.declines?.length||0)],
      ['open', m.pop-m.cleared],
    ].map(([l,v])=>`<div class="stat"><div class="v">${esc(v)}</div><div class="l">${l}</div></div>`).join('');
    if ($('metrics').innerHTML !== mh) $('metrics').innerHTML = mh;
  }

  // still-open people (derived: in population, not in any deal)
  const cleared = new Set((s.deals||[]).flatMap(d=>d.who));
  const open = (s.population||[]).filter(p=>!cleared.has(p.name));
  setText($('umCount'), String(open.length));
  const umh = open.map(p=>`<div class="um"><b>${esc(p.name)}</b> — ${(p.intents||[]).map(esc).join(' · ')}</div>`).join('')
    || '<span class="empty">everyone matched 🎉</span>';
  if ($('um').innerHTML !== umh) $('um').innerHTML = umh;
}

async function poll() {
  try { const r = await fetch('/fuzz-live.json?_='+Date.now()); if (r.ok) render(await r.json()); }
  catch {}
}
poll(); setInterval(poll, 700);
</script>
</body>
</html>
